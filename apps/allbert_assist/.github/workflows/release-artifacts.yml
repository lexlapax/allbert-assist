# v0.62 M1 (Locked Decisions 2/3/4, S2-ratified): native per-target release
# artifacts. Freeze-blocking matrix: macos-arm64, linux-x64 (glibc >= 2.35
# via ubuntu-22.04), linux-arm64. No cross-compilation (rebar3 erlexec and
# the muontrap/erlexec port executables forbid it). The OTP/Elixir toolchain
# is pinned below (LD-4); macOS bundles its OpenSSL dylibs at assembly
# (patch_macos_openssl release step).
name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  MIX_ENV: prod
  OTP_VERSION: "29.0"
  ELIXIR_VERSION: "1.19.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM (Linux)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up BEAM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install erlang elixir
          elixir --version

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: rel-${{ matrix.target }}-${{ hashFiles('mix.lock') }}

      - name: Build release
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix release allbert --overwrite

      - name: Package artifact
        run: |
          VERSION=$(grep -m1 'version:' mix.exs | sed 's/.*version: "\(.*\)".*/\1/')
          mkdir -p dist
          tar -czf "dist/allbert-v${VERSION}-${{ matrix.target }}.tar.gz" -C _build/prod/rel allbert
          ls -la dist/

      - name: Smoke-boot the artifact
        run: |
          WORK=$(mktemp -d)
          tar -xzf dist/allbert-v*-${{ matrix.target }}.tar.gz -C "$WORK"
          env -i HOME="$WORK" PATH=/usr/bin:/bin SHELL=/bin/sh ALLBERT_HOME="$WORK/home" LANG=C.UTF-8 \
            "$WORK/allbert/bin/allbert" eval 'IO.puts("smoke-eval-ok " <> to_string(Application.spec(:allbert_assist, :vsn)))'

      - uses: actions/upload-artifact@v4
        with:
          name: allbert-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 30
