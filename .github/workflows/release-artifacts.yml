# v0.62 M1 (Locked Decisions 2/3/4, S2-ratified 2026-07-06): native per-target
# release artifacts. Freeze-blocking matrix: macos-arm64, linux-x64 (glibc
# >= 2.35 via ubuntu-22.04), linux-arm64. No cross-compilation (rebar3 erlexec
# and the muontrap/erlexec port executables forbid it). Toolchain pinned (LD-4);
# macOS bundles its OpenSSL dylibs at assembly (patch_macos_openssl step).
name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  MIX_ENV: prod
  OTP_VERSION: "29.0"
  ELIXIR_VERSION: "1.19.5"

jobs:
  # v0.62b: a docs/source point release (e.g. v0.62.1) must NOT produce packaged
  # artifacts or steal GitHub "Latest" from the product release (v0.62.0), which
  # owns the tarballs + version-less `latest` aliases install.sh/Homebrew resolve.
  # An annotated tag whose message contains `[skip-artifacts]` skips the whole
  # packaged pipeline; product-release tags (no marker) build + publish as before.
  # workflow_dispatch (no tag) always builds so dry-runs still work.
  gate:
    runs-on: ubuntu-22.04
    outputs:
      artifacts: ${{ steps.decide.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            # actions/checkout may peel the local tag ref to the commit before this
            # step runs; refetch the tag object so annotated tag messages remain
            # readable for docs/source [skip-artifacts] releases.
            git fetch --force --no-tags origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          fi
          msg="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' 2>/dev/null || true)"
          if printf '%s' "$msg" | grep -qF '[skip-artifacts]'; then
            echo "artifacts=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${GITHUB_REF_NAME} is marked [skip-artifacts]; skipping packaged build/publish (docs/source point release)."
          else
            echo "artifacts=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.artifacts == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM (Linux)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up BEAM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install erlang elixir
          elixir --version

      - name: Build release
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix hex.audit
          mix release allbert --overwrite

      - name: Package artifact
        run: |
          VERSION=$(grep -m1 'version:' mix.exs | sed 's/.*version: "\(.*\)".*/\1/')
          ARTIFACT_VERSION="v${VERSION}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            ARTIFACT_VERSION="${GITHUB_REF_NAME}"
          fi
          mkdir -p dist
          tar -czf "dist/allbert-${ARTIFACT_VERSION}-${{ matrix.target }}.tar.gz" -C _build/prod/rel allbert
          ls -la dist/

      - name: Provision browser runtime prerequisites outside the artifact
        if: matrix.target != 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          runtime="$RUNNER_TEMP/allbert-playwright-host"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm install --prefix "$runtime" --ignore-scripts --no-audit --no-fund --no-save \
            playwright@1.58.2
          actual="$(node -e 'process.stdout.write(require(process.argv[1]).version)' \
            "$runtime/node_modules/playwright/package.json")"
          test "$actual" = 1.58.2

          if [ "$RUNNER_OS" = macOS ]; then
            browser="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          else
            browser="$(command -v chromium || command -v google-chrome-stable || command -v google-chrome)"
          fi

          test -x "$browser"
          echo "PLAYWRIGHT_NODE_PATH=$runtime/node_modules" >> "$GITHUB_ENV"
          echo "BROWSER_BINARY_PATH=$browser" >> "$GITHUB_ENV"

      - name: Smoke the artifact on the runner (boot, browser doctor, health, attach)
        if: matrix.target != 'linux-arm64'
        run: |
          WORK=$(mktemp -d)
          tar -xzf dist/allbert-v*-${{ matrix.target }}.tar.gz -C "$WORK"
          bash scripts/smoke/artifact_smoke.sh "$WORK/allbert" "${{ matrix.target }}" | tee "smoke-${{ matrix.target }}.log"

      - name: Smoke linux-arm64 with Debian OS browser prerequisites
        if: matrix.target == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --platform linux/arm64 \
            --mount type=bind,source="$PWD",target=/repo,readonly \
            --workdir /tmp node:22-bookworm \
            bash -lc 'set -euo pipefail
              apt-get update
              apt-get install -y ca-certificates chromium libstdc++6 openssl
              runtime=/tmp/allbert-playwright-host
              PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install \
                --prefix "$runtime" --ignore-scripts --no-audit --no-fund --no-save \
                playwright@1.58.2
              actual="$(node -e '\''process.stdout.write(require(process.argv[1]).version)'\'' \
                "$runtime/node_modules/playwright/package.json")"
              test "$actual" = 1.58.2
              test -x /usr/bin/chromium
              mkdir -p /tmp/extract
              tar -xzf /repo/dist/allbert-v*-linux-arm64.tar.gz -C /tmp/extract
              chown -R node:node /tmp/extract "$runtime"
              su -s /bin/bash node -c "set -euo pipefail
                export PLAYWRIGHT_NODE_PATH=$runtime/node_modules
                export BROWSER_BINARY_PATH=/usr/bin/chromium
                bash /repo/scripts/smoke/artifact_smoke.sh \
                  /tmp/extract/allbert linux-arm64"' \
            | tee smoke-linux-arm64.log

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.target }}
          path: smoke-${{ matrix.target }}.log
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: allbert-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 30

  # v0.62 M8.13: Linux install/serve/service/vault rehearsal on a real Ubuntu
  # host — the automated counterpart to the manual macOS rehearsal. Installs the
  # built linux-x64 artifact through install.sh's symlink path, smokes the CLI,
  # and rehearses the Secret Service vault (gnome-keyring) + systemd --user
  # service where the runner allows (both degrade gracefully, matching the
  # documented headless fallback). Evidence uploads as an artifact.
  linux-rehearsal:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: allbert-linux-x64
          path: dist
      - name: Extract the built artifact
        run: |
          mkdir -p work
          tar -xzf dist/*.tar.gz -C work
          echo "REL_ROOT=$PWD/work/allbert" >> "$GITHUB_ENV"
      - name: Provision browser runtime prerequisites outside the artifact
        shell: bash
        run: |
          set -euo pipefail
          runtime="$RUNNER_TEMP/allbert-playwright-host"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm install --prefix "$runtime" --ignore-scripts --no-audit --no-fund --no-save \
            playwright@1.58.2
          actual="$(node -e 'process.stdout.write(require(process.argv[1]).version)' \
            "$runtime/node_modules/playwright/package.json")"
          test "$actual" = 1.58.2
          browser="$(command -v chromium || command -v google-chrome-stable || command -v google-chrome)"
          test -x "$browser"
          echo "PLAYWRIGHT_NODE_PATH=$runtime/node_modules" >> "$GITHUB_ENV"
          echo "BROWSER_BINARY_PATH=$browser" >> "$GITHUB_ENV"
      - name: Install Secret Service tooling (gnome-keyring + secret-tool)
        run: sudo apt-get update && sudo apt-get install -y gnome-keyring libsecret-tools dbus-x11
      - name: Select Linux rehearsal trust path
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            echo "ALLBERT_REHEARSAL_SIGN_CHECKSUMS=1" >> "$GITHUB_ENV"
          else
            version="$(grep -m1 'version:' mix.exs | sed 's/.*version: "\(.*\)".*/\1/')"
            artifact="allbert-v${version}-linux-x64.tar.gz"
            stage="$RUNNER_TEMP/allbert-preverified-stage"
            mkdir -p "$stage"
            test -f "dist/$artifact"
            cp "dist/$artifact" "$stage/$artifact"
            (cd "$stage" && sha256sum "$artifact" > SHA256SUMS)
            echo "ALLBERT_REHEARSAL_PREVERIFIED_STAGE=$stage" >> "$GITHUB_ENV"
            echo "ALLBERT_REHEARSAL_VERSION=v$version" >> "$GITHUB_ENV"
          fi
      - name: Install cosign for signed local installer rehearsal
        if: github.ref_type == 'tag'
        uses: sigstore/cosign-installer@v3
      - name: Linux rehearsal (install / smoke / vault / service / uninstall)
        run: |
          set -o pipefail
          # A D-Bus session + an unlocked login keyring so the Secret Service
          # (tier-1 Linux) path is exercisable; the rehearsal script SKIPs the
          # vault step cleanly if the keyring is unavailable.
          dbus-run-session -- bash -c '
            echo "ci-keyring-pass" | gnome-keyring-daemon --unlock --components=secrets >/dev/null 2>&1 || true
            eval "$(echo ci-keyring-pass | gnome-keyring-daemon --start --components=secrets 2>/dev/null)" || true
            bash scripts/smoke/linux_rehearsal.sh "$REL_ROOT"
          ' | tee linux-rehearsal.log
      - name: Upload rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-rehearsal-log
          path: linux-rehearsal.log
          retention-days: 30

  # v0.62 M2/M8: collect the per-target artifacts, publish SHA256SUMS, and
  # attach everything to the GitHub release. Tag pushes only — the operator
  # holds the real v0.62.0 tag, so this fires when they push it (or on a
  # prerelease tag during validation). Checksums are what install.sh and the
  # Homebrew formula verify against.
  publish:
    # v0.62 M8.17: gate publish on the Linux rehearsal too, so a broken
    # install/smoke on Linux blocks the release instead of shipping.
    needs: [build, linux-rehearsal]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + alias + checksum
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cd dist
          # Version-less aliases so the `latest` install path resolves
          # (install.sh fetches allbert-<target>.tar.gz from releases/latest/download).
          # v0.62 M8.17: derive the alias from the KNOWN target suffix, not a
          # version regex — a prerelease tag (allbert-v0.62.0-rc1-linux-x64.tar.gz)
          # has a hyphen the old `v[0-9.]*-` regex mistook for the version
          # terminator, mangling the alias to `allbert-rc1-...`.
          for target in macos-arm64 linux-x64 linux-arm64; do
            for f in allbert-v*-"$target".tar.gz; do
              [ -e "$f" ] || continue
              cp "$f" "allbert-$target.tar.gz"
            done
          done
          # Checksums cover BOTH the versioned assets and the version-less aliases.
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Cosign checksums (keyless)
        uses: sigstore/cosign-installer@v3
      - name: Sign SHA256SUMS
        # v0.64: install-time signature verification is fail-closed, so the
        # signing step must also be a hard gate. Publishing an unsigned
        # SHA256SUMS would make every installer fail verification.
        run: |
          cd dist
          cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS
      - name: Publish to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A pushed tag does NOT auto-create a GitHub Release, and `gh release
          # upload` requires the release to exist — so create it first (idempotent
          # on workflow re-runs). A hyphen-tagged version (e.g. v0.62.0-rc1) is
          # marked --prerelease so the `latest` install path never resolves to it.
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            prerelease=""
            case "${GITHUB_REF_NAME}" in *-*) prerelease="--prerelease" ;; esac
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag $prerelease
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
