# v0.62 M1 (Locked Decisions 2/3/4, S2-ratified 2026-07-06): native per-target
# release artifacts. Freeze-blocking matrix: macos-arm64, linux-x64 (glibc
# >= 2.35 via ubuntu-22.04), linux-arm64. No cross-compilation (rebar3 erlexec
# and the muontrap/erlexec port executables forbid it). Toolchain pinned (LD-4);
# macOS bundles its OpenSSL dylibs at assembly (patch_macos_openssl step).
name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  MIX_ENV: prod
  OTP_VERSION: "29.0"
  ELIXIR_VERSION: "1.19.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM (Linux)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up BEAM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install erlang elixir
          elixir --version

      - name: Build release
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix release allbert --overwrite

      - name: Package artifact
        run: |
          VERSION=$(grep -m1 'version:' mix.exs | sed 's/.*version: "\(.*\)".*/\1/')
          mkdir -p dist
          tar -czf "dist/allbert-v${VERSION}-${{ matrix.target }}.tar.gz" -C _build/prod/rel allbert
          ls -la dist/

      - name: Smoke the artifact (boot, plugins, /health, attach, no-Mix, crypto linkage)
        run: |
          WORK=$(mktemp -d)
          tar -xzf dist/allbert-v*-${{ matrix.target }}.tar.gz -C "$WORK"
          bash scripts/smoke/artifact_smoke.sh "$WORK/allbert" "${{ matrix.target }}" | tee "smoke-${{ matrix.target }}.log"

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.target }}
          path: smoke-${{ matrix.target }}.log
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: allbert-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 30

  # v0.62 M2/M8: collect the per-target artifacts, publish SHA256SUMS, and
  # attach everything to the GitHub release. Tag pushes only — the operator
  # holds the real v0.62.0 tag, so this fires when they push it (or on a
  # prerelease tag during validation). Checksums are what install.sh and the
  # Homebrew formula verify against.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + checksum
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Cosign checksums (keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cd dist
          cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
